
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="theme-color" content="#ffffff">
  
  <link rel="preconnect" href="https://cdn.tailwindcss.com">
  
  <title>Portal de Casos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-blue-light': '#00adef',
            'brand-blue-dark': '#03304f',
            'monday-green': '#00c875',
            'monday-orange': '#ff9f1a',
            'monday-red': '#e2445c',
            'monday-purple': '#a25ddc',
            'monday-dark-purple': '#784bd1',
            'monday-yellow': '#ffcb00',
            'monday-light-green': '#9cd326',
            'monday-pink': '#ff647f',
            'monday-light-blue': '#66ccff',
            // New Impact Palette
            'impactBlue': '#00ADEF',
            'impactNavy': '#03304F',
            'impactDark': '#0E1116',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-up': 'slideUp 0.5s ease-out forwards',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: 0 },
              '100%': { opacity: 1 },
            },
            slideUp: {
              '0%': { opacity: 0, transform: 'translateY(20px)' },
              '100%': { opacity: 1, transform: 'translateY(0)' },
            },
          },
          backgroundImage: {
            'impact-gradient': 'linear-gradient(135deg, #03304F 0%, #00ADEF 100%)',
          },
          backdropBlur: {
            xs: '2px',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-800 overscroll-none">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
